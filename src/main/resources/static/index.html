<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" href="images/favicon.png" type="image/png">
    <title>文件盒子</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
<div class="share-notice" id="shareNotice">
    <span class="share-notice-label">局域网访问地址</span>
    <span class="share-notice-url" id="shareNoticeUrl"></span>
    <button class="share-copy-btn" id="shareCopyBtn" type="button" title="复制" aria-label="复制"><svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-copy"/></svg></button>
</div>
<div class="header-controls">
        <!-- 存储空间切换 / storage space switcher -->
        <div class="header-dropdown" id="storageSwitcher">
            <button class="hd-trigger" id="storageTrigger" type="button" title="切换存储空间" aria-label="切换存储空间">
                <svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-database"/></svg>
                <span id="storageCurrent">…</span>
                <svg class="ico caret" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-chevron"/></svg>
            </button>
            <div class="hd-menu" id="storageMenu"><!-- 存储空间列表动态插入 / spaces injected here --></div>
        </div>

        <!-- 用户菜单 / user menu(点击用户名展开 / click username to open) -->
        <div class="header-dropdown" id="userMenu">
            <button class="hd-trigger hd-user" id="userTrigger" type="button">
                <svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-user"/></svg>
                <span id="user-info"></span>
                <svg class="ico caret" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-chevron"/></svg>
            </button>
            <div class="hd-menu" id="userMenuList">
                <div class="hd-menu-info"><span class="hd-menu-info-value" id="currentRole">—</span></div>
                <div class="hd-menu-sep"></div>
                <!-- 仅管理员可见 / ADMIN only -->
                <a class="hd-menu-item" id="adminEntry" href="/admin/dashboard.html" style="display:none;"><svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-dashboard"/></svg>后台管理</a>
                <div class="hd-menu-sep" id="adminSep" style="display:none;"></div>
                <a class="hd-menu-item" id="changePwdEntry" href="javascript:void(0);"><svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-key"/></svg>修改密码</a>
                <a class="hd-menu-item hd-danger" id="logoutEntry" href="/logout"><svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-logout"/></svg>退出登录</a>
                <a class="hd-menu-item" id="loginEntry" href="/logout" style="display:none;"><svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-login"/></svg>去登录</a>
            </div>
        </div>

        <!-- 主题切换 / theme toggle(theme.js 注入按钮 / button injected by theme.js) -->
        <span id="theme-toggle-slot"></span>
    </div>
<div class="container">
    <div class="header-title">
        <div class="logo-wrapper">
            <img src="images/logo.png" alt="文件盒子Logo" class="header-logo">
        </div>
        <h1>文件盒子</h1>
        <div class="logo-wrapper"></div>
    </div>

    <div id="dropzone" tabindex="0">
        在当前页面粘贴文件/截图 (Ctrl+V / ⌘+V)
        <br/>
        或拖放文件到此处
        <!-- 文件上传入口 -->
        <div class="file-input-wrapper">
                <button id="selectFileBtn" class="btn">选择文件</button>
                <input type="file" id="fileInput" />
            </div>
    </div>

    <!-- 上传进度模态框 -->
    <div id="upload-modal-overlay">
        <div id="upload-progress-container">
            <div id="upload-status">准备上传...</div>
            <div id="upload-progress">
                <div id="upload-progress-bar"></div>
                <div id="upload-progress-percentage">0%</div>
            </div>
            <div id="upload-details">
                <span id="upload-size-info">0 B / 0 B</span>
                <span id="upload-speed">0 B/s</span>
            </div>
            <button id="upload-cancel-btn">取消上传</button>
            <div id="countdown-bar"></div>
        </div>
    </div>

    <textarea id="textpaste" placeholder="或在此粘贴文本"></textarea>
    <button id="sendText" class="btn">上传文本</button>

    <div class="divider" id="uploadDivider"></div>

    <div class="view-tabs">
        <button id="tab-recent" class="view-tab active"><svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-history"/></svg><span class="view-tab-full">时间线浏览</span><span class="view-tab-short">时间线</span></button>
        <button id="tab-dir" class="view-tab"><svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-folder-tree"/></svg><span class="view-tab-full">目录浏览</span><span class="view-tab-short">目录</span></button>
        <span class="view-tab-sep" aria-hidden="true"></span>
        <button id="tab-block" class="view-tab active" title="卡片视图" aria-label="卡片视图"><svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-grid"/></svg><span class="view-tab-text">卡片</span></button>
        <button id="tab-row" class="view-tab" title="列表视图" aria-label="列表视图"><svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-list"/></svg><span class="view-tab-text">列表</span></button>
    </div>

    <div id="recent-view">
    <section id="timeTimeline" class="time-timeline" aria-label="按文件修改时间筛选">
        <div class="timeline-row timeline-year-row" aria-label="年份">
            <button class="timeline-scroll" type="button" data-target="yearTimelineViewport" data-direction="-1" aria-label="向前浏览年份">‹</button>
            <div id="yearTimelineViewport" class="timeline-viewport" tabindex="0">
                <div id="yearTimeline" class="timeline-track" role="tablist" aria-label="选择年份"></div>
            </div>
            <button class="timeline-scroll" type="button" data-target="yearTimelineViewport" data-direction="1" aria-label="向后浏览年份">›</button>
        </div>
    </section>
    <div id="recent"></div>
    <div id="recent-sentinel" class="scroll-sentinel" hidden>
        <div class="loading-spinner loading-spinner--mini"></div>
        <span>正在加载更多…</span>
    </div>
    </div><!-- /recent-view -->

    <div id="dir-view" style="display:none">
        <div class="dir-header">
            <div id="dir-breadcrumb" class="dir-breadcrumb"></div>
            <div class="dir-header-actions">
                <button id="newFolderBtn" class="btn" style="display:none">＋ <span class="hide-on-mobile">新建文件夹</span></button>
            </div>
        </div>
        <div id="dirContent"></div>
        <div id="dir-sentinel" class="scroll-sentinel" hidden>
            <div class="loading-spinner loading-spinner--mini"></div>
            <span>正在加载更多…</span>
        </div>
    </div>
</div>

<script src="js/notification.js"></script>
<script src="js/index.js"></script>
<script src="js/theme.js"></script>
</body>

</html>
