<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Box - 存储空间管理</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="admin-layout">
    <!-- Sidebar / 侧栏 -->
    <aside class="sidebar admin-sidebar">
        <div class="admin-brand">
            <h1 class="text-gradient">File Box</h1>
            <p>管理后台</p>
        </div>
        <nav class="admin-nav">
            <a href="/admin/dashboard.html" class="nav-item">
                <svg class="ico nav-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-dashboard"/></svg>
                <span>仪表盘</span>
            </a>
            <a href="/admin/storage.html" class="nav-item active">
                <svg class="ico nav-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-storage"/></svg>
                <span>存储管理</span>
            </a>
            <a href="/admin/users.html" class="nav-item">
                <svg class="ico nav-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-users"/></svg>
                <span>用户管理</span>
            </a>
            <a href="/admin/settings.html" class="nav-item">
                <svg class="ico nav-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-settings"/></svg>
                <span>系统设置</span>
            </a>
        </nav>
        <div class="admin-sidebar-footer">
            <a class="info-row" href="https://github.com/wangwen135/file-box" target="_blank" rel="noopener noreferrer">
                <svg class="info-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-github"/></svg>
                <span>GitHub</span>
            </a>
            <div class="info-row">
                <svg class="info-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-tag"/></svg>
                <span data-app-version>v0.0.0</span>
            </div>
            <div class="info-row">
                <svg class="info-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-scale"/></svg>
                <span>Apache-2.0</span>
            </div>
            <a class="info-row" href="mailto:wangwen135@163.com" title="wangwen135@163.com">
                <svg class="info-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-user"/></svg>
                <span>by wwh</span>
            </a>
        </div>
    </aside>

    <!-- Main Content / 主内容 -->
    <main class="admin-main">
        <!-- Header -->
        <div class="page-header">
            <div>
                <h2 class="page-title">存储空间管理</h2>
                <p class="page-subtitle">配置和管理存储空间</p>
            </div>
            <button onclick="openAddModal()" class="btn">
                <span class="btn-icon">+</span>新增存储空间
            </button>
        </div>

        <!-- Storage Table / 存储空间表 -->
        <div class="table-container">
            <div class="table-header">
                <div class="table-cells table-cells-6">
                    <div>名称</div>
                    <div>路径</div>
                    <div>容量限制</div>
                    <div>使用情况</div>
                    <div>匿名</div>
                    <div>操作</div>
                </div>
            </div>
            <div id="storageList">
                <!-- 存储条目动态插入 / Storage items inserted here -->
            </div>
        </div>
    </main>

    <!-- Add/Edit Modal / 新增/编辑模态框 -->
    <div id="storageModal" class="modal">
        <div class="modal-content">
            <h3 class="modal-title" id="modalTitle">新增存储空间</h3>
            <form id="storageForm" onsubmit="saveStorage(event)">
                <input type="hidden" id="editName">
                <div class="form-stack">
                    <div class="form-group">
                        <label class="form-label">存储空间名称</label>
                        <input type="text" id="storageName" class="input-field" placeholder="例如：default" required>
                        <p class="text-muted text-tiny" id="renameHint" style="display:none;margin-top:6px;">
                            <svg class="ico" viewBox="0 0 24 24" aria-hidden="true" style="width:14px;height:14px;vertical-align:-2px;">
                                <use href="/images/icons.svg#ico-info"/>
                            </svg>
                            修改名称将同步更新已分配用户与活跃会话，不会移动磁盘文件。
                        </p>
                    </div>
                    <div class="form-group">
                        <label class="form-label">存储路径</label>
                        <input type="text" id="storagePath" class="input-field" placeholder="例如：/opt/file-box/data" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">容量限制</label>
                        <div class="field-row">
                            <input type="number" id="storageSize" class="input-field" placeholder="10" required>
                            <select id="storageUnit" class="input-field field-fixed">
                                <option value="GB">GB</option>
                                <option value="MB">MB</option>
                                <option value="TB">TB</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="checkbox-label" style="display:block;">
                            <input type="checkbox" id="allowAnonymousAccess" onchange="onAnonChange()">
                            匿名访问（允许匿名浏览此空间）
                        </label>
                        <label class="checkbox-label" style="display:block;margin-top:10px;">
                            <input type="checkbox" id="allowAnonymousUpload" onchange="onAnonChange()">
                            匿名上传（允许匿名用户向此空间上传文件）
                        </label>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" onclick="closeModal()" class="btn btn-secondary">取消</button>
                    <button type="submit" class="btn">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/notification.js"></script>
    <script src="/js/admin-common.js"></script>
    <script>
        let isEditing = false;

        // Load storage spaces
        async function loadStorage() {
            try {
                const response = await fetch('/api/admin/storage');
                if (response.ok) {
                    const data = await response.json();
                    renderStorageList(data);
                }
            } catch (error) {
                console.error('Failed to load storage:', error);
            }
        }

        function renderStorageList(storageList) {
            const container = document.getElementById('storageList');
            if (storageList.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无存储空间</div>';
                return;
            }

            container.innerHTML = storageList.map((space, index) => `
                <div class="table-row" data-row-index="${index}">
                    <div class="table-cells table-cells-6">
                        <div class="cell-strong">${space.name}</div>
                        <div class="cell-muted-mono">${space.path}</div>
                        <div class="cell-muted">${space.maxSize}</div>
                        <div class="storage-progress-wrap">
                            <div class="progress-bar storage-progress-bar">
                                <div class="progress-fill" style="width: 0%"></div>
                            </div>
                            <span class="progress-text">加载中...</span>
                        </div>
                        <div class="anon-cell">
                            ${(!space.allowAnonymousAccess && !space.allowAnonymousUpload)
                                ? '<span class="anon-badge anon-off">未开启</span>'
                                : (space.allowAnonymousUpload
                                    ? '<span class="anon-badge anon-on" title="匿名浏览+上传"><svg class="ico anon-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-globe"/></svg>可上传</span>'
                                    : '<span class="anon-badge anon-on" title="仅匿名浏览"><svg class="ico anon-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-globe"/></svg>仅浏览</span>')}
                        </div>
                        <div class="row-actions">
                            <button onclick="editStorage('${space.name}')" class="btn btn-sm btn-secondary">编辑</button>
                            <button onclick="deleteStorage('${space.name}')" class="btn btn-sm btn-danger">删除</button>
                        </div>
                    </div>
                </div>
            `).join('');

            // Load stats for each storage
            storageList.forEach(async (space, index) => {
                // 按索引精确选中本行；原先用 nth-child 会误选到第一行内部单元格，
                // 导致除第一行外全部停留在「加载中...」、进度条宽度恒为 0%。
                // Select this row by its render-time index. The old nth-child selector
                // mistakenly matched inner cells of the first row, so every row after the
                // first stayed on "加载中..." with a 0% bar.
                const row = container.querySelector(`.table-row[data-row-index="${index}"]`);
                const progressBar = row && row.querySelector('.progress-fill');
                const progressText = row && row.querySelector('.progress-text');
                try {
                    const statsResponse = await fetch(`/api/admin/storage/${encodeURIComponent(space.name)}/stats`);
                    let usedBytes = 0;
                    let percentage = 0;
                    if (statsResponse.ok) {
                        const stats = await statsResponse.json();
                        usedBytes = stats.usedSize || 0;
                        const maxBytes = parseSize(space.maxSize);
                        percentage = maxBytes > 0 ? (usedBytes / maxBytes * 100) : 0;
                    }
                    // 拉取失败（如目录不存在返回 404）给兜底文案，避免长期停留「加载中...」
                    // Fallback text when stats can't be loaded (e.g. 404 for a missing dir).
                    const labelText = statsResponse.ok
                        ? `${formatBytes(usedBytes)} / ${space.maxSize}`
                        : '—';
                    if (progressBar) progressBar.style.width = percentage.toFixed(1) + '%';
                    if (progressText) progressText.textContent = labelText;
                } catch (error) {
                    console.error('Failed to load stats for', space.name, error);
                    if (progressText) progressText.textContent = '—';
                }
            });
        }

        function openAddModal() {
            isEditing = false;
            document.getElementById('modalTitle').textContent = '新增存储空间';
            document.getElementById('storageForm').reset();
            document.getElementById('editName').value = '';
            document.getElementById('renameHint').style.display = 'none';
            document.getElementById('storageModal').classList.add('show');
        }

        function editStorage(name) {
            isEditing = true;
            document.getElementById('modalTitle').textContent = '编辑存储空间';
            document.getElementById('editName').value = name;
            document.getElementById('storageName').value = name;
            document.getElementById('renameHint').style.display = 'block';
            // Load full details
            fetch(`/api/admin/storage/${encodeURIComponent(name)}`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('storagePath').value = data.path;
                    document.getElementById('storageSize').value = parseInt(data.maxSize) || 10;
                    const unit = data.maxSize.match(/[A-Z]+/)?.[0] || 'GB';
                    document.getElementById('storageUnit').value = unit;
                    document.getElementById('allowAnonymousAccess').checked = data.allowAnonymousAccess || false;
                    document.getElementById('allowAnonymousUpload').checked = data.allowAnonymousUpload || false;
                });
            document.getElementById('storageModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('storageModal').classList.remove('show');
        }

        // 匿名勾选联动:勾选上传→自动勾选访问;取消访问→自动取消上传 / link the two checkboxes (upload implies access)
        function onAnonChange() {
            const access = document.getElementById('allowAnonymousAccess');
            const upload = document.getElementById('allowAnonymousUpload');
            if (upload.checked) access.checked = true;     // 勾上传→勾访问
            if (!access.checked) upload.checked = false;   // 取消访问→取消上传
        }

        async function saveStorage(event) {
            event.preventDefault();
            const name = document.getElementById('storageName').value;
            const path = document.getElementById('storagePath').value;
            const size = document.getElementById('storageSize').value;
            const unit = document.getElementById('storageUnit').value;
            const allowAnonymousAccess = document.getElementById('allowAnonymousAccess').checked;
            const allowAnonymousUpload = document.getElementById('allowAnonymousUpload').checked;

            // 改名前二次确认（仅当名称确实改变时才拦截）/ confirm only when the name actually changes
            if (isEditing) {
                const original = document.getElementById('editName').value;
                if (name.trim() !== original.trim()) {
                    const ok = await Notify.confirm({
                        title: '重命名存储空间',
                        content: `将存储空间 <strong>${original}</strong> 重命名为 <strong>${name.trim()}</strong> 吗？<br><span class="text-muted">已分配用户与活跃会话将同步更新，物理文件不受影响。</span>`,
                        okText: '确认重命名',
                        cancelText: '取消'
                    });
                    if (!ok) return;
                }
            }

            const data = {
                name,
                path,
                maxSize: size + unit,
                allowAnonymousAccess,
                allowAnonymousUpload
            };

            try {
                const url = isEditing ? `/api/admin/storage/${encodeURIComponent(document.getElementById('editName').value)}` : '/api/admin/storage';
                const method = isEditing ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    const error = await response.text();
                    Notify.error('保存失败：' + error, { position: 'top-center' });
                    return;
                }
                // 后端即使逻辑失败也返回 HTTP 200 + {success,error}，需按 success 判断
                // Backend returns HTTP 200 with {success,error} even on logical failure.
                const result = await response.json();
                if (result.success) {
                    closeModal();
                    loadStorage();
                } else {
                    Notify.error('保存失败：' + (result.error || '未知错误'), { position: 'top-center' });
                }
            } catch (error) {
                Notify.error('保存失败：' + error.message, { position: 'top-center' });
            }
        }

        async function deleteStorage(name) {
            const confirmed = await Notify.confirm({
                title: '删除存储空间',
                content: `确定要删除存储空间 <strong>${name}</strong> 吗？<br><br><span class="text-muted">此操作只会删除配置，不会删除物理文件。</span>`,
                okText: '删除',
                cancelText: '取消',
                okType: 'danger',
                width: 420
            });
            if (!confirmed) {
                return;
            }

            try {
                const response = await fetch(`/api/admin/storage/${encodeURIComponent(name)}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    loadStorage();
                    Notify.success('存储空间已删除');
                } else {
                    const error = await response.text();
                    Notify.error('删除失败：' + error, { position: 'top-center' });
                }
            } catch (error) {
                Notify.error('删除失败：' + error.message, { position: 'top-center' });
            }
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function parseSize(sizeStr) {
            const match = sizeStr.match(/(\d+(?:\.\d+)?)\s*(KB|MB|GB|TB)?/i);
            if (!match) return 0;
            const value = parseFloat(match[1]);
            const unit = (match[2] || 'B').toUpperCase();
            const multipliers = { 'B': 1, 'KB': 1024, 'MB': 1024 * 1024, 'GB': 1024 * 1024 * 1024, 'TB': 1024 * 1024 * 1024 * 1024 };
            return value * (multipliers[unit] || 1);
        }

        // Initialize
        loadStorage();
    </script>
    <script src="/js/theme.js"></script>
</body>
</html>
