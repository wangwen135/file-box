<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Box - 存储空间管理</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="/css/theme.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #0f172a;
            min-height: 100vh;
        }
        .sidebar {
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            border-right: 1px solid #334155;
        }
        .nav-item {
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }
        .nav-item:hover {
            background: rgba(14, 165, 233, 0.1);
            border-left-color: #0ea5e9;
        }
        .nav-item.active {
            background: rgba(14, 165, 233, 0.15);
            border-left-color: #0ea5e9;
        }
        .btn {
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            color: white;
            border: none;
            padding: 0.5rem 1.25rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.4);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }
        .btn-danger:hover {
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
        }
        .btn-secondary {
            background: #334155;
            border: 1px solid #475569;
        }
        .btn-secondary:hover {
            background: #475569;
        }
        .btn-sm {
            padding: 0.375rem 0.75rem;
            font-size: 0.875rem;
        }
        .input-field {
            background: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 0.625rem 0.875rem;
            border-radius: 8px;
            width: 100%;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            outline: none;
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
        }
        .input-field::placeholder {
            color: #64748b;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        .table-container {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            overflow: hidden;
        }
        .table-header {
            background: #0f172a;
            border-bottom: 1px solid #334155;
        }
        .table-row {
            border-bottom: 1px solid #334155;
            transition: background 0.2s ease;
        }
        .table-row:last-child {
            border-bottom: none;
        }
        .table-row:hover {
            background: rgba(14, 165, 233, 0.05);
        }
        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .badge-active {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }
        .progress-bar {
            background: #334155;
            border-radius: 9999px;
            overflow: hidden;
            height: 6px;
        }
        .progress-fill {
            background: linear-gradient(90deg, #0ea5e9 0%, #22d3ee 100%);
            transition: width 0.5s ease;
        }
        .section-title {
            color: #e2e8f0;
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }
        .text-gradient {
            background: linear-gradient(135deg, #0ea5e9 0%, #22d3ee 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .checkbox-label input {
            margin-right: 0.5rem;
            accent-color: #0ea5e9;
        }
    </style>
</head>
<body class="flex">
    <!-- Sidebar -->
    <div class="sidebar w-64 min-h-screen text-white flex flex-col">
        <div class="p-6 border-b border-gray-700">
            <h1 class="text-xl font-bold text-gradient">File Box</h1>
            <p class="text-sm text-gray-400 mt-1">管理后台</p>
        </div>
        <nav class="mt-6 flex-1">
            <a href="/admin/dashboard.html" class="nav-item flex items-center px-6 py-3 text-gray-300">
                <span class="mr-3">📊</span>
                <span>仪表盘</span>
            </a>
            <a href="/admin/storage.html" class="nav-item active flex items-center px-6 py-3 text-gray-300">
                <span class="mr-3">💾</span>
                <span>存储管理</span>
            </a>
            <a href="/admin/users.html" class="nav-item flex items-center px-6 py-3 text-gray-300">
                <span class="mr-3">👥</span>
                <span>用户管理</span>
            </a>
        </nav>
        <div class="p-6 border-t border-gray-700">
            <div class="flex items-center text-gray-400 text-sm mb-4">
                <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span>
                <span id="currentUser">admin</span>
            </div>
            <a href="/logout" class="btn btn-secondary w-full text-center block">退出登录</a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-8">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-2xl font-bold text-white mb-2">存储空间管理</h2>
                <p class="text-gray-400">配置和管理存储空间</p>
            </div>
            <button onclick="openAddModal()" class="btn">
                <span class="mr-2">+</span> 新增存储空间
            </button>
        </div>

        <!-- Storage Table -->
        <div class="table-container">
            <div class="table-header px-6 py-4">
                <div class="grid grid-cols-5 gap-4 text-sm font-medium text-gray-400">
                    <div>名称</div>
                    <div>路径</div>
                    <div>容量限制</div>
                    <div>使用情况</div>
                    <div>操作</div>
                </div>
            </div>
            <div id="storageList">
                <!-- Storage items will be inserted here -->
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="storageModal" class="modal">
        <div class="modal-content">
            <h3 class="text-xl font-bold text-white mb-6" id="modalTitle">新增存储空间</h3>
            <form id="storageForm" onsubmit="saveStorage(event)">
                <input type="hidden" id="editName">
                <div class="space-y-4">
                    <div>
                        <label class="block text-gray-400 text-sm mb-2">存储空间名称</label>
                        <input type="text" id="storageName" class="input-field" placeholder="例如：default" required>
                    </div>
                    <div>
                        <label class="block text-gray-400 text-sm mb-2">存储路径</label>
                        <input type="text" id="storagePath" class="input-field" placeholder="例如：/opt/file-box/data" required>
                    </div>
                    <div>
                        <label class="block text-gray-400 text-sm mb-2">容量限制</label>
                        <div class="flex gap-2">
                            <input type="number" id="storageSize" class="input-field" placeholder="10" required>
                            <select id="storageUnit" class="input-field" style="width: 100px;">
                                <option value="GB">GB</option>
                                <option value="MB">MB</option>
                                <option value="TB">TB</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-400 text-sm mb-2">URL 前缀</label>
                        <input type="text" id="storageUrl" class="input-field" placeholder="http://localhost:8080">
                    </div>
                    <div>
                        <label class="checkbox-label text-gray-400 text-sm">
                            <input type="checkbox" id="allowAnonymous">
                            允许匿名访问
                        </label>
                    </div>
                </div>
                <div class="flex gap-3 mt-8">
                    <button type="button" onclick="closeModal()" class="btn btn-secondary flex-1">取消</button>
                    <button type="submit" class="btn flex-1">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let isEditing = false;

        // Get current user info
        async function getUserInfo() {
            try {
                const response = await fetch('/api/auth/user');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('currentUser').textContent = data.username;
                    if (data.role !== 'ADMIN') {
                        window.location.href = '/index.html';
                    }
                }
            } catch (error) {
                console.error('Failed to get user info:', error);
            }
        }

        // Load storage spaces
        async function loadStorage() {
            try {
                const response = await fetch('/api/admin/storage');
                if (response.ok) {
                    const data = await response.json();
                    renderStorageList(data);
                }
            } catch (error) {
                console.error('Failed to load storage:', error);
            }
        }

        function renderStorageList(storageList) {
            const container = document.getElementById('storageList');
            if (storageList.length === 0) {
                container.innerHTML = '<div class="px-6 py-8 text-center text-gray-400">暂无存储空间</div>';
                return;
            }

            container.innerHTML = storageList.map(space => `
                <div class="table-row px-6 py-4">
                    <div class="grid grid-cols-5 gap-4 items-center">
                        <div class="text-white font-medium">${space.name}</div>
                        <div class="text-gray-400 text-sm truncate">${space.path}</div>
                        <div class="text-gray-400 text-sm">${space.maxSize}</div>
                        <div class="w-full">
                            <div class="progress-bar mb-1">
                                <div class="progress-fill" style="width: 0%"></div>
                            </div>
                            <span class="text-gray-500 text-xs">加载中...</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editStorage('${space.name}')" class="btn btn-sm btn-secondary">编辑</button>
                            <button onclick="deleteStorage('${space.name}')" class="btn btn-sm btn-danger">删除</button>
                        </div>
                    </div>
                </div>
            `).join('');

            // Load stats for each storage
            storageList.forEach(async (space) => {
                try {
                    const statsResponse = await fetch(`/api/admin/storage/${space.name}/stats`);
                    if (statsResponse.ok) {
                        const stats = await statsResponse.json();
                        const maxBytes = parseSize(space.maxSize);
                        const percentage = maxBytes > 0 ? ((stats.usedBytes || 0) / maxBytes * 100).toFixed(1) : 0;
                        
                        // Update the progress bar and text
                        const storageDiv = container.querySelector(`div:nth-child(${storageList.indexOf(space) + 1})`);
                        if (storageDiv) {
                            const progressBar = storageDiv.querySelector('.progress-fill');
                            const progressText = storageDiv.querySelector('.text-gray-500');
                            if (progressBar) progressBar.style.width = percentage + '%';
                            if (progressText) progressText.textContent = `${formatBytes(stats.usedBytes || 0)} / ${space.maxSize}`;
                        }
                    }
                } catch (error) {
                    console.error('Failed to load stats for', space.name, error);
                }
            });
        }

        function openAddModal() {
            isEditing = false;
            document.getElementById('modalTitle').textContent = '新增存储空间';
            document.getElementById('storageForm').reset();
            document.getElementById('editName').value = '';
            document.getElementById('storageModal').classList.add('show');
        }

        function editStorage(name) {
            isEditing = true;
            document.getElementById('modalTitle').textContent = '编辑存储空间';
            document.getElementById('editName').value = name;
            document.getElementById('storageName').value = name;
            // Load full details
            fetch(`/api/admin/storage/${name}`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('storagePath').value = data.path;
                    document.getElementById('storageSize').value = parseInt(data.maxSize) || 10;
                    const unit = data.maxSize.match(/[A-Z]+/)?.[0] || 'GB';
                    document.getElementById('storageUnit').value = unit;
                    document.getElementById('storageUrl').value = data.urlPrefix || '';
                    document.getElementById('allowAnonymous').checked = data.allowAnonymous || false;
                });
            document.getElementById('storageModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('storageModal').classList.remove('show');
        }

        async function saveStorage(event) {
            event.preventDefault();
            const name = document.getElementById('storageName').value;
            const path = document.getElementById('storagePath').value;
            const size = document.getElementById('storageSize').value;
            const unit = document.getElementById('storageUnit').value;
            const urlPrefix = document.getElementById('storageUrl').value;
            const allowAnonymous = document.getElementById('allowAnonymous').checked;

            const data = {
                name,
                path,
                maxSize: size + unit,
                urlPrefix: urlPrefix || 'http://localhost:8080',
                allowAnonymous
            };

            try {
                const url = isEditing ? `/api/admin/storage/${document.getElementById('editName').value}` : '/api/admin/storage';
                const method = isEditing ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    closeModal();
                    loadStorage();
                } else {
                    const error = await response.text();
                    alert('保存失败：' + error);
                }
            } catch (error) {
                alert('保存失败：' + error.message);
            }
        }

        async function deleteStorage(name) {
            if (!confirm(`确定要删除存储空间 "${name}" 吗？\n\n注意：此操作不会删除物理文件，只会删除配置。`)) {
                return;
            }

            try {
                const response = await fetch(`/api/admin/storage/${name}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    loadStorage();
                } else {
                    const error = await response.text();
                    alert('删除失败：' + error);
                }
            } catch (error) {
                alert('删除失败：' + error.message);
            }
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function parseSize(sizeStr) {
            const match = sizeStr.match(/(\d+(?:\.\d+)?)\s*(KB|MB|GB|TB)?/i);
            if (!match) return 0;
            const value = parseFloat(match[1]);
            const unit = (match[2] || 'B').toUpperCase();
            const multipliers = { 'B': 1, 'KB': 1024, 'MB': 1024 * 1024, 'GB': 1024 * 1024 * 1024, 'TB': 1024 * 1024 * 1024 * 1024 };
            return value * (multipliers[unit] || 1);
        }

        // Initialize
        getUserInfo();
        loadStorage();
    </script>
    <script src="/js/theme.js"></script>
</body>
</html>
