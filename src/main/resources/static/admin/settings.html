<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Box - 系统设置</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="admin-layout">
    <!-- Sidebar / 侧栏 -->
    <aside class="sidebar admin-sidebar">
        <div class="admin-brand">
            <h1 class="text-gradient">File Box</h1>
            <p>管理后台</p>
        </div>
        <nav class="admin-nav">
            <a href="/admin/dashboard.html" class="nav-item">
                <svg class="ico nav-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-dashboard"/></svg>
                <span>仪表盘</span>
            </a>
            <a href="/admin/storage.html" class="nav-item">
                <svg class="ico nav-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-storage"/></svg>
                <span>存储管理</span>
            </a>
            <a href="/admin/users.html" class="nav-item">
                <svg class="ico nav-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-users"/></svg>
                <span>用户管理</span>
            </a>
            <a href="/admin/settings.html" class="nav-item active">
                <svg class="ico nav-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-settings"/></svg>
                <span>系统设置</span>
            </a>
        </nav>
        <div class="admin-sidebar-footer">
            <a class="info-row" href="https://github.com/wangwen135/file-box" target="_blank" rel="noopener noreferrer">
                <svg class="info-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-github"/></svg>
                <span>GitHub</span>
            </a>
            <div class="info-row">
                <svg class="info-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-tag"/></svg>
                <span data-app-version>v0.0.0</span>
            </div>
            <div class="info-row">
                <svg class="info-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-scale"/></svg>
                <span>Apache-2.0</span>
            </div>
            <a class="info-row" href="mailto:wangwen135@163.com" title="wangwen135@163.com">
                <svg class="info-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-user"/></svg>
                <span>by wwh</span>
            </a>
        </div>
    </aside>

    <!-- Main Content / 主内容 -->
    <main class="admin-main">
        <!-- Header -->
        <div class="page-header-simple">
            <h2 class="page-title">系统设置</h2>
            <p class="page-subtitle">配置系统参数和选项</p>
        </div>

        <!-- Alert / 提示条 -->
        <div id="alert" class="alert" style="display: none;"></div>

        <!-- Basic Settings / 基础设置 -->
        <div class="card">
            <h3 class="section-title section-title--bordered">基础设置</h3>
            <div class="setting-row">
                <div>
                    <p class="setting-row-title">首页访问提示</p>
                    <p class="setting-row-desc">在上传页左上角展示可复制的局域网访问地址</p>
                </div>
                <div class="toggle-switch" id="shareNoticeToggle" onclick="toggleShareNotice()"></div>
            </div>
        </div>

        <!-- Anonymous Access / 匿名访问 -->
        <div class="card">
            <h3 class="section-title section-title--bordered">匿名访问</h3>
            <div class="setting-row">
                <div>
                    <p class="setting-row-title">启用匿名访问</p>
                    <p class="setting-row-desc">允许未登录用户访问匿名存储空间</p>
                </div>
                <div class="toggle-switch" id="anonymousToggle" onclick="toggleAnonymous()"></div>
            </div>
        </div>

        <!-- Anonymous Upload / 匿名上传 -->
        <div class="card">
            <h3 class="section-title section-title--bordered">匿名上传</h3>
            <div class="setting-row">
                <div>
                    <p class="setting-row-title">启用匿名上传</p>
                    <p class="setting-row-desc">允许匿名用户上传文件到匿名空间</p>
                </div>
                <div class="toggle-switch" id="anonymousUploadToggle" onclick="toggleAnonymousUpload()"></div>
            </div>
        </div>

        <!-- Save Button / 保存按钮 -->
        <div class="form-actions-right">
            <button onclick="saveSettings()" class="btn">保存设置</button>
        </div>
    </main>

    <script src="/js/notification.js"></script>
    <script src="/js/admin-common.js"></script>
    <script>
        let settings = {
            shareNoticeEnabled: true,
            anonymousEnabled: false,
            anonymousUploadEnabled: false
        };

        // Load settings
        async function loadSettings() {
            try {
                // Load system config
                const configResponse = await fetch('/api/auth/config');
                if (configResponse.ok) {
                    const config = await configResponse.json();
                    if (config.configExists) {
                        settings.shareNoticeEnabled = config.shareNoticeEnabled !== false;
                    }
                }

                // Load anonymous config
                const anonResponse = await fetch('/api/auth/anonymous-config');
                if (anonResponse.ok) {
                    const anonConfig = await anonResponse.json();
                    settings.anonymousEnabled = anonConfig['anonymous-upload-enabled'] || false;
                    settings.anonymousUploadEnabled = anonConfig['anonymous-upload-enabled'] || false;
                }

                // Update UI
                updateToggle('shareNoticeToggle', settings.shareNoticeEnabled);
                updateToggle('anonymousToggle', settings.anonymousEnabled);
                updateToggle('anonymousUploadToggle', settings.anonymousUploadEnabled);
            } catch (error) {
                console.error('Failed to load settings:', error);
            }
        }

        function updateToggle(id, isOn) {
            const toggle = document.getElementById(id);
            if (isOn) {
                toggle.classList.add('on');
            } else {
                toggle.classList.remove('on');
            }
        }

        function toggleAnonymous() {
            settings.anonymousEnabled = !settings.anonymousEnabled;
            settings.anonymousUploadEnabled = settings.anonymousEnabled;
            updateToggle('anonymousToggle', settings.anonymousEnabled);
            updateToggle('anonymousUploadToggle', settings.anonymousUploadEnabled);
        }

        function toggleAnonymousUpload() {
            settings.anonymousUploadEnabled = !settings.anonymousUploadEnabled;
            settings.anonymousEnabled = settings.anonymousUploadEnabled;
            updateToggle('anonymousToggle', settings.anonymousEnabled);
            updateToggle('anonymousUploadToggle', settings.anonymousUploadEnabled);
        }

        function toggleShareNotice() {
            settings.shareNoticeEnabled = !settings.shareNoticeEnabled;
            updateToggle('shareNoticeToggle', settings.shareNoticeEnabled);
        }

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = 'alert ' + (type === 'success' ? 'alert-success' : 'alert-error');
            alert.style.display = 'block';
            setTimeout(() => {
                alert.style.display = 'none';
            }, 3000);
        }

        async function saveSettings() {
            try {
                // Save system config
                const configData = {
                    shareNoticeEnabled: settings.shareNoticeEnabled
                };

                const configResponse = await fetch('/api/admin/config', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(configData)
                });

                // Save anonymous config
                const anonData = {
                    enabled: settings.anonymousEnabled,
                    'anonymous-upload-enabled': settings.anonymousUploadEnabled
                };

                const anonResponse = await fetch('/api/admin/anonymous', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(anonData)
                });

                if (configResponse.ok && anonResponse.ok) {
                    showAlert('设置已保存', 'success');
                } else {
                    showAlert('保存失败', 'error');
                }
            } catch (error) {
                showAlert('保存失败：' + error.message, 'error');
            }
        }

        // Initialize
        loadSettings();
    </script>
    <script src="/js/theme.js"></script>
</body>
</html>
