<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Box - 系统设置</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="admin-layout">
    <!-- Sidebar / 侧栏 -->
    <aside class="sidebar admin-sidebar">
        <div class="admin-brand">
            <h1 class="text-gradient">File Box</h1>
            <p>管理后台</p>
        </div>
        <nav class="admin-nav">
            <a href="/admin/dashboard.html" class="nav-item">
                <span>📊</span>
                <span>仪表盘</span>
            </a>
            <a href="/admin/storage.html" class="nav-item">
                <span>💾</span>
                <span>存储管理</span>
            </a>
            <a href="/admin/users.html" class="nav-item">
                <span>👥</span>
                <span>用户管理</span>
            </a>
            <a href="/admin/settings.html" class="nav-item active">
                <span>⚙️</span>
                <span>系统设置</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content / 主内容 -->
    <main class="admin-main">
        <!-- Header -->
        <div class="page-header-simple">
            <h2 class="page-title">系统设置</h2>
            <p class="page-subtitle">配置系统参数和选项</p>
        </div>

        <!-- Alert / 提示条 -->
        <div id="alert" class="alert" style="display: none;"></div>

        <!-- Basic Settings / 基础设置 -->
        <div class="card">
            <h3 class="section-title section-title--bordered">基础设置</h3>
            <div class="form-group">
                <label class="form-label">系统名称</label>
                <input type="text" id="systemName" class="input-field" placeholder="File Box">
            </div>
            <div class="form-group">
                <label class="form-label">系统描述</label>
                <input type="text" id="systemDesc" class="input-field" placeholder="文件共享和管理工具">
            </div>
        </div>

        <!-- Anonymous Access / 匿名访问 -->
        <div class="card">
            <h3 class="section-title section-title--bordered">匿名访问</h3>
            <div class="setting-row">
                <div>
                    <p class="setting-row-title">启用匿名访问</p>
                    <p class="setting-row-desc">允许未登录用户访问匿名存储空间</p>
                </div>
                <div class="toggle-switch" id="anonymousToggle" onclick="toggleAnonymous()"></div>
            </div>
        </div>

        <!-- Anonymous Upload / 匿名上传 -->
        <div class="card">
            <h3 class="section-title section-title--bordered">匿名上传</h3>
            <div class="setting-row">
                <div>
                    <p class="setting-row-title">启用匿名上传</p>
                    <p class="setting-row-desc">允许匿名用户上传文件到匿名空间</p>
                </div>
                <div class="toggle-switch" id="anonymousUploadToggle" onclick="toggleAnonymousUpload()"></div>
            </div>
        </div>

        <!-- Save Button / 保存按钮 -->
        <div class="form-actions-right">
            <button onclick="saveSettings()" class="btn">保存设置</button>
        </div>
    </main>

    <script src="/js/notification.js"></script>
    <script src="/js/admin-common.js"></script>
    <script>
        let settings = {
            name: 'File Box',
            description: '文件共享和管理工具',
            anonymousEnabled: false,
            anonymousUploadEnabled: false
        };

        // Get current user info
        async function getUserInfo() {
            try {
                const response = await fetch('/api/auth/user');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('currentUser').textContent = data.username;
                    if (data.role !== 'ADMIN') {
                        window.location.href = '/index.html';
                    }
                }
            } catch (error) {
                console.error('Failed to get user info:', error);
            }
        }

        // Load settings
        async function loadSettings() {
            try {
                // Load system config
                const configResponse = await fetch('/api/auth/config');
                if (configResponse.ok) {
                    const config = await configResponse.json();
                    if (config.configExists) {
                        settings.name = config.name || 'File Box';
                        settings.description = config.description || '';
                    }
                }

                // Load anonymous config
                const anonResponse = await fetch('/api/auth/anonymous-config');
                if (anonResponse.ok) {
                    const anonConfig = await anonResponse.json();
                    settings.anonymousEnabled = anonConfig.enabled || false;
                    settings.anonymousUploadEnabled = anonConfig['anonymous-upload-enabled'] || false;
                }

                // Update UI
                document.getElementById('systemName').value = settings.name;
                document.getElementById('systemDesc').value = settings.description;
                updateToggle('anonymousToggle', settings.anonymousEnabled);
                updateToggle('anonymousUploadToggle', settings.anonymousUploadEnabled);
            } catch (error) {
                console.error('Failed to load settings:', error);
            }
        }

        function updateToggle(id, isOn) {
            const toggle = document.getElementById(id);
            if (isOn) {
                toggle.classList.add('on');
            } else {
                toggle.classList.remove('on');
            }
        }

        function toggleAnonymous() {
            settings.anonymousEnabled = !settings.anonymousEnabled;
            updateToggle('anonymousToggle', settings.anonymousEnabled);
        }

        function toggleAnonymousUpload() {
            settings.anonymousUploadEnabled = !settings.anonymousUploadEnabled;
            updateToggle('anonymousUploadToggle', settings.anonymousUploadEnabled);
        }

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = 'alert ' + (type === 'success' ? 'alert-success' : 'alert-error');
            alert.style.display = 'block';
            setTimeout(() => {
                alert.style.display = 'none';
            }, 3000);
        }

        async function saveSettings() {
            try {
                // Save system config
                const configData = {
                    name: document.getElementById('systemName').value,
                    description: document.getElementById('systemDesc').value
                };

                const configResponse = await fetch('/api/admin/config', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(configData)
                });

                // Save anonymous config
                const anonData = {
                    enabled: settings.anonymousEnabled,
                    'anonymous-upload-enabled': settings.anonymousUploadEnabled
                };

                const anonResponse = await fetch('/api/admin/anonymous', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(anonData)
                });

                if (configResponse.ok || anonResponse.ok) {
                    showAlert('设置已保存', 'success');
                } else {
                    showAlert('保存失败', 'error');
                }
            } catch (error) {
                showAlert('保存失败：' + error.message, 'error');
            }
        }

        // Initialize
        getUserInfo();
        loadSettings();
    </script>
    <script src="/js/theme.js"></script>
</body>
</html>
