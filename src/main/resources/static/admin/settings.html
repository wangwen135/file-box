<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Box - 系统设置</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="admin-layout">
    <!-- Sidebar / 侧栏 -->
    <aside class="sidebar admin-sidebar">

            <p>管理后台</p>
        </div>
        <nav class="admin-nav">
            <a href="/admin/dashboard.html" class="nav-item">
                <svg class="ico nav-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-dashboard"/></svg>
                <span>仪表盘</span>
            </a>
            <a href="/admin/storage.html" class="nav-item">
                <svg class="ico nav-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-storage"/></svg>
                <span>存储管理</span>
            </a>
            <a href="/admin/users.html" class="nav-item">
                <svg class="ico nav-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-users"/></svg>
                <span>用户管理</span>
            </a>
            <a href="/admin/settings.html" class="nav-item active">
                <svg class="ico nav-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-settings"/></svg>

            </a>
        </nav>
        <div class="admin-sidebar-footer">
            <a class="info-row" href="https://github.com/wangwen135/file-box" target="_blank" rel="noopener noreferrer">
                <svg class="info-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-github"/></svg>
                <span>GitHub</span>
            </a>
            <div class="info-row">
                <svg class="info-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-tag"/></svg>
                <span data-app-version>v0.0.0</span>
            </div>
            <div class="info-row">
                <svg class="info-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-scale"/></svg>
                <span>Apache-2.0</span>
            </div>
            <a class="info-row" href="mailto:wangwen135@163.com" title="wangwen135@163.com">
                <svg class="info-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-user"/></svg>
                <span>by wwh</span>
            </a>
        </div>
    </aside>

    <!-- Main Content / 主内容 -->
    <main class="admin-main">
        <!-- Header -->
        <div class="page-header-simple">
            <h2 class="page-title">系统设置</h2>
            <p class="page-subtitle">配置系统参数和选项</p>
        </div>

        <!-- Alert / 提示条 -->
        <div id="alert" class="alert" style="display: none;"></div>

        <!-- Share notice setting / 首页访问提示设置 -->
        <div class="card">
            <div class="setting-row">
                <div>
                    <p class="setting-row-title">首页访问提示</p>
                    <p class="setting-row-desc">在上传页左上角展示可复制的局域网访问地址</p>
                    <div class="setting-address">
                        <span class="setting-address-label">局域网访问地址</span>
                        <span class="setting-address-url" id="shareNoticeUrl"></span>
                        <button class="setting-copy-btn" id="shareCopyBtn" type="button" title="复制访问地址" aria-label="复制访问地址">
                            <svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-copy"/></svg>
                        </button>
                    </div>
                </div>
                <div class="toggle-switch" id="shareNoticeToggle" onclick="toggleShareNotice()"></div>
            </div>
        </div>

        <!-- 匿名访问(总开关)/ anonymous access gate -->
        <div class="card">
            <div class="setting-row">
                <div>
                    <p class="setting-row-title">启用匿名访问</p>
                    <p class="setting-row-desc">允许未登录用户浏览匿名存储空间（只读）</p>
                    <p class="setting-note">需要至少有一个存储空间开启“匿名访问”，匿名用户才能进入。匿名用户默认看不到上传区和局域网访问地址。</p>
                </div>
                <div class="toggle-switch" id="anonymousAccessToggle" onclick="toggleAnonymousAccess()"></div>
            </div>
        </div>

        <!-- 匿名上传(需要先开启匿名访问)/ anonymous upload (requires access) -->
        <div class="card">
            <div class="setting-row">
                <div>
                    <p class="setting-row-title">允许匿名上传</p>
                    <p class="setting-row-desc">额外允许匿名用户上传文件。开启时会自动开启“启用匿名访问”，关闭访问时此项会一并关闭。</p>
                </div>
                <div class="toggle-switch" id="anonymousUploadToggle" onclick="toggleAnonymousUpload()"></div>
            </div>
        </div>
    </main>

    <script src="/js/notification.js"></script>
    <script src="/js/admin-common.js"></script>
    <script>
        let settings = {
            shareNoticeEnabled: true,
            anonymousAccessEnabled: false,
            anonymousUploadEnabled: false
        };

        // Load settings
        async function loadSettings() {
            try {
                // Load system config
                const configResponse = await fetch('/api/auth/config');
                if (configResponse.ok) {
                    const config = await configResponse.json();
                    if (config.configExists) {
                        settings.shareNoticeEnabled = config.shareNoticeEnabled !== false;
                    }
                }

                // Load anonymous config
                const anonResponse = await fetch('/api/auth/anonymous-config');
                if (anonResponse.ok) {
                    const anonConfig = await anonResponse.json();
                    settings.anonymousAccessEnabled = anonConfig['anonymous-access-enabled'] || false;
                    settings.anonymousUploadEnabled = anonConfig['anonymous-upload-enabled'] || false;
                }

                // Update UI
                updateToggle('shareNoticeToggle', settings.shareNoticeEnabled);
                updateToggle('anonymousAccessToggle', settings.anonymousAccessEnabled);
                updateToggle('anonymousUploadToggle', settings.anonymousUploadEnabled);
            } catch (error) {
                console.error('Failed to load settings:', error);
            }
        }

        function updateToggle(id, isOn) {
            const toggle = document.getElementById(id);
            if (isOn) {
                toggle.classList.add('on');
            } else {
                toggle.classList.remove('on');
            }
        }

        // 切换"启用匿名访问":关闭访问时,上传一并关闭 / toggle access gate: turning it off also turns upload off
        async function toggleAnonymousAccess() {
            const prevAccess = settings.anonymousAccessEnabled;
            const prevUpload = settings.anonymousUploadEnabled;
            const newAccess = !prevAccess;
            const newUpload = newAccess ? prevUpload : false;
            settings.anonymousAccessEnabled = newAccess;
            settings.anonymousUploadEnabled = newUpload;
            updateToggle('anonymousAccessToggle', newAccess);
            updateToggle('anonymousUploadToggle', newUpload);
            await autoSave(
                'anonymousAccessToggle',
                '/api/admin/anonymous',
                { anonymousAccessEnabled: newAccess, anonymousUploadEnabled: newUpload },
                () => {
                    settings.anonymousAccessEnabled = prevAccess;
                    settings.anonymousUploadEnabled = prevUpload;
                    updateToggle('anonymousAccessToggle', prevAccess);
                    updateToggle('anonymousUploadToggle', prevUpload);
                }
            );
        }

        // 切换"允许匿名上传":开启上传时,访问自动开启 / toggle upload: turning it on also turns access on
        async function toggleAnonymousUpload() {
            const prevAccess = settings.anonymousAccessEnabled;
            const prevUpload = settings.anonymousUploadEnabled;
            const newUpload = !prevUpload;
            const newAccess = newUpload ? true : prevAccess;
            settings.anonymousUploadEnabled = newUpload;
            settings.anonymousAccessEnabled = newAccess;
            updateToggle('anonymousUploadToggle', newUpload);
            updateToggle('anonymousAccessToggle', newAccess);
            await autoSave(
                'anonymousUploadToggle',
                '/api/admin/anonymous',
                { anonymousAccessEnabled: newAccess, anonymousUploadEnabled: newUpload },
                () => {
                    settings.anonymousAccessEnabled = prevAccess;
                    settings.anonymousUploadEnabled = prevUpload;
                    updateToggle('anonymousUploadToggle', prevUpload);
                    updateToggle('anonymousAccessToggle', prevAccess);
                }
            );
        }

        async function toggleShareNotice() {
            const previous = settings.shareNoticeEnabled;
            settings.shareNoticeEnabled = !settings.shareNoticeEnabled;
            updateToggle('shareNoticeToggle', settings.shareNoticeEnabled);
            await autoSave(
                'shareNoticeToggle',
                '/api/admin/config',
                { shareNoticeEnabled: settings.shareNoticeEnabled },
                () => {
                    settings.shareNoticeEnabled = previous;
                    updateToggle('shareNoticeToggle', previous);
                }
            );
        }

        function showAlert(message, type) {
            // 统一走 Notify 通用提示 / route through the shared Notify component
            if (type === 'success') {
                Notify.success(message);
            } else {
                Notify.error(message, { position: 'top-center' });
            }
        }

        async function autoSave(toggleId, url, data, rollback) {
            const toggle = document.getElementById(toggleId);
            toggle.classList.add('saving');
            try {
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!response.ok) {
                    throw new Error('服务器返回 ' + response.status);
                }
                showAlert('设置已自动保存', 'success');
            } catch (error) {
                rollback();
                showAlert('自动保存失败：' + error.message, 'error');
            } finally {
                toggle.classList.remove('saving');
            }
        }

        async function copyTextToClipboard(text) {
            if (navigator.clipboard && window.isSecureContext) {
                try {
                    await navigator.clipboard.writeText(text);
                    return true;
                } catch (error) {
                    // Fall through to the legacy copy method.
                }
            }
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.setAttribute('readonly', '');
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            let copied = false;
            try {
                copied = document.execCommand('copy');
            } catch (error) {
                copied = false;
            }
            document.body.removeChild(textarea);
            return copied;
        }

        const shareNoticeUrl = window.location.origin;
        document.getElementById('shareNoticeUrl').textContent = shareNoticeUrl;
        document.getElementById('shareCopyBtn').addEventListener('click', async () => {
            const copied = await copyTextToClipboard(shareNoticeUrl);
            if (copied) {
                Notify.success('访问地址已复制');
            } else {
                Notify.error('复制失败，请手动复制地址');
            }
        });

        // Initialize
        loadSettings();
    </script>
    <script src="/js/theme.js"></script>
</body>
</html>
