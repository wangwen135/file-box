<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Box - 管理后台</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="admin-layout">
    <!-- Sidebar / 侧栏 -->
    <aside class="sidebar admin-sidebar">
        <div class="admin-brand">
            <h1 class="text-gradient">File Box</h1>
            <p>管理后台</p>
        </div>
        <nav class="admin-nav">
            <a href="/admin/dashboard.html" class="nav-item active">
                <span>📊</span>
                <span>仪表盘</span>
            </a>
            <a href="/admin/storage.html" class="nav-item">
                <span>💾</span>
                <span>存储管理</span>
            </a>
            <a href="/admin/users.html" class="nav-item">
                <span>👥</span>
                <span>用户管理</span>
            </a>
            <a href="/admin/settings.html" class="nav-item">
                <span>⚙️</span>
                <span>系统设置</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content / 主内容 -->
    <main class="admin-main">
        <!-- Header -->
        <div class="page-header-simple">
            <h2 class="page-title">仪表盘</h2>
            <p class="page-subtitle">系统概览和统计信息</p>
        </div>

        <!-- Stats Grid / 统计卡片 -->
        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-head">
                    <div class="stat-icon blue">💾</div>
                    <span class="stat-icon-label">存储空间</span>
                </div>
                <h3 class="stat-value" id="storageCount">0</h3>
                <p class="stat-label">已配置</p>
            </div>
            <div class="stat-card">
                <div class="stat-head">
                    <div class="stat-icon green">👥</div>
                    <span class="stat-icon-label">用户数量</span>
                </div>
                <h3 class="stat-value" id="userCount">0</h3>
                <p class="stat-label">已注册</p>
            </div>
            <div class="stat-card">
                <div class="stat-head">
                    <div class="stat-icon purple">📁</div>
                    <span class="stat-icon-label">文件总数</span>
                </div>
                <h3 class="stat-value" id="fileCount">0</h3>
                <p class="stat-label">已上传</p>
            </div>
            <div class="stat-card">
                <div class="stat-head">
                    <div class="stat-icon orange">📊</div>
                    <span class="stat-icon-label">总容量</span>
                </div>
                <h3 class="stat-value" id="totalCapacity">0 GB</h3>
                <p class="stat-label">已使用</p>
            </div>
        </div>

        <!-- Storage Usage / 存储使用情况 -->
        <div class="card card-mb">
            <h3 class="section-title">存储空间使用情况</h3>
            <div id="storageUsageList">
                <!-- 存储使用条目动态插入 / Storage usage items inserted here -->
            </div>
        </div>

        <!-- System Info / 系统信息 -->
        <div class="card">
            <h3 class="section-title">系统信息</h3>
            <div class="sys-info-list">
                <div class="sys-info-row">
                    <span class="sys-info-key">系统名称</span>
                    <span class="sys-info-val" id="systemName">File Box</span>
                </div>
                <div class="sys-info-row">
                    <span class="sys-info-key">版本</span>
                    <span class="sys-info-val">v0.2.0</span>
                </div>
                <div class="sys-info-row">
                    <span class="sys-info-key">运行时间</span>
                    <span class="sys-info-val" id="uptime">-</span>
                </div>
                <div class="sys-info-row">
                    <span class="sys-info-key">Java 版本</span>
                    <span class="sys-info-val" id="javaVersion">-</span>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/notification.js"></script>
    <script src="/js/admin-common.js"></script>
    <script>
        // Get current user info
        async function getUserInfo() {
            try {
                const response = await fetch('/api/auth/user');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('currentUser').textContent = data.username;
                    if (data.role !== 'ADMIN') {
                        window.location.href = '/index.html';
                    }
                }
            } catch (error) {
                console.error('Failed to get user info:', error);
            }
        }

        // Load dashboard data
        async function loadDashboard() {
            try {
                // Load storage spaces
                const storageResponse = await fetch('/api/admin/storage');
                if (storageResponse.ok) {
                    const storageData = await storageResponse.json();
                    document.getElementById('storageCount').textContent = storageData.length;

                    let totalUsed = 0;
                    let totalCapacity = 0;
                    let totalFiles = 0;

                    const usageList = document.getElementById('storageUsageList');
                    usageList.innerHTML = '';

                    for (const space of storageData) {
                        const statsResponse = await fetch(`/api/admin/storage/${space.name}/stats`);
                        if (statsResponse.ok) {
                            const stats = await statsResponse.json();
                            totalUsed += stats.usedBytes || 0;
                            totalFiles += stats.fileCount || 0;

                            const maxBytes = parseSize(space.maxSize);
                            totalCapacity += maxBytes;

                            const percentage = maxBytes > 0 ? ((stats.usedBytes || 0) / maxBytes * 100).toFixed(1) : 0;

                            usageList.innerHTML += `
                                <div class="usage-item">
                                    <div class="usage-row">
                                        <span class="usage-name">${space.name}</span>
                                        <span class="usage-meta">${formatBytes(stats.usedBytes || 0)} / ${space.maxSize}</span>
                                    </div>
                                    <div class="progress-bar">
                                        <div class="progress-fill" style="width: ${percentage}%"></div>
                                    </div>
                                    <p class="usage-progress-text">${stats.fileCount || 0} 个文件</p>
                                </div>
                            `;
                        }
                    }

                    document.getElementById('fileCount').textContent = totalFiles.toLocaleString();
                    document.getElementById('totalCapacity').textContent = formatBytes(totalUsed);
                }

                // Load users
                const usersResponse = await fetch('/api/admin/users');
                if (usersResponse.ok) {
                    const usersData = await usersResponse.json();
                    document.getElementById('userCount').textContent = usersData.length;
                }
            } catch (error) {
                console.error('Failed to load dashboard:', error);
            }
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function parseSize(sizeStr) {
            const match = sizeStr.match(/(\d+(?:\.\d+)?)\s*(KB|MB|GB|TB)?/i);
            if (!match) return 0;
            const value = parseFloat(match[1]);
            const unit = (match[2] || 'B').toUpperCase();
            const multipliers = { 'B': 1, 'KB': 1024, 'MB': 1024 * 1024, 'GB': 1024 * 1024 * 1024, 'TB': 1024 * 1024 * 1024 * 1024 };
            return value * (multipliers[unit] || 1);
        }

        // Initialize
        getUserInfo();
        loadDashboard();
    </script>
    <script src="/js/theme.js"></script>
</body>
</html>
