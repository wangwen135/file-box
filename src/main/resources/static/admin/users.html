<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Box - 用户管理</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="admin-layout">
    <!-- Sidebar / 侧栏 -->
    <aside class="sidebar admin-sidebar">
        <div class="admin-brand">
            <h1 class="text-gradient">File Box</h1>
            <p>管理后台</p>
        </div>
        <nav class="admin-nav">
            <a href="/admin/dashboard.html" class="nav-item">
                <svg class="ico nav-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-dashboard"/></svg>
                <span>仪表盘</span>
            </a>
            <a href="/admin/storage.html" class="nav-item">
                <svg class="ico nav-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-storage"/></svg>
                <span>存储管理</span>
            </a>
            <a href="/admin/users.html" class="nav-item active">
                <svg class="ico nav-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-users"/></svg>
                <span>用户管理</span>
            </a>
            <a href="/admin/settings.html" class="nav-item">
                <svg class="ico nav-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-settings"/></svg>
                <span>系统设置</span>
            </a>
        </nav>
        <div class="admin-sidebar-footer">
            <a class="info-row" href="https://github.com/wangwen135/file-box" target="_blank" rel="noopener noreferrer">
                <svg class="info-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-github"/></svg>
                <span>GitHub</span>
            </a>
            <div class="info-row">
                <svg class="info-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-tag"/></svg>
                <span data-app-version>v0.0.0</span>
            </div>
            <div class="info-row">
                <svg class="info-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-scale"/></svg>
                <span>Apache-2.0</span>
            </div>
            <a class="info-row" href="mailto:wangwen135@163.com" title="wangwen135@163.com">
                <svg class="info-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-user"/></svg>
                <span>by wwh</span>
            </a>
        </div>
    </aside>

    <!-- Main Content / 主内容 -->
    <main class="admin-main">
        <!-- Header -->
        <div class="page-header">
            <div>
                <h2 class="page-title">用户管理</h2>
                <p class="page-subtitle">管理用户账号和权限</p>
            </div>
            <button onclick="openAddModal()" class="btn">
                <span class="btn-icon">+</span>新增用户
            </button>
        </div>

        <!-- Users Table / 用户表 -->
        <div class="table-container">
            <div class="table-header">
                <div class="table-cells table-cells-4">
                    <div>用户名</div>
                    <div>角色</div>
                    <div>存储空间</div>
                    <div>操作</div>
                </div>
            </div>
            <div id="userList">
                <!-- 用户条目动态插入 / User items inserted here -->
            </div>
        </div>
    </main>

    <!-- Add/Edit Modal / 新增/编辑模态框 -->
    <div id="userModal" class="modal">
        <div class="modal-content modal-content--wide">
            <h3 class="modal-title" id="modalTitle">新增用户</h3>
            <form id="userForm" onsubmit="saveUser(event)">
                <input type="hidden" id="editUsername">
                <div class="form-stack">
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <input type="text" id="username" class="input-field" placeholder="请输入用户名" required>
                    </div>
                    <div class="form-group" id="passwordField">
                        <label class="form-label" id="passwordLabel">密码</label>
                        <input type="password" id="password" class="input-field" placeholder="请输入密码" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">确认密码</label>
                        <input type="password" id="confirmPassword" class="input-field" placeholder="请再次输入密码">
                    </div>
                    <div class="form-group">
                        <label class="form-label">角色</label>
                        <select id="role" class="input-field" required>
                            <option value="USER">普通用户 (User)</option>
                            <option value="MANAGER">管理员 (Manager)</option>
                            <option value="ADMIN">超级管理员 (Admin)</option>
                        </select>
                        <!-- 角色权限对比 / role permission comparison -->
                        <div id="roleTable"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">存储空间权限</label>
                        <div id="storageCheckboxes" class="checkbox-group">
                            <!-- 存储空间多选动态插入 / Storage checkboxes inserted here -->
                        </div>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" onclick="closeModal()" class="btn btn-secondary">取消</button>
                    <button type="submit" class="btn">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/notification.js"></script>
    <script src="/js/admin-common.js"></script>
    <script>
        let isEditing = false;
        let availableStorages = [];

        // 角色权限对比矩阵 / role permission matrix
        const ROLE_HEADERS = ['能力', '普通用户', '管理员', '超级管理员'];
        const ROLE_PERMISSIONS = [
            { label: '上传/下载/浏览',                perms: [true,  true,  true] },
            { label: '删除文件',                      perms: [false, true,  true] },
            { label: '管理文件夹(新建/重命名/删除)',   perms: [false, true,  true] },
            { label: '进入后台管理',                  perms: [false, false, true] },
            { label: '自动拥有全部存储空间',          perms: [false, false, true] }
        ];

        // 渲染角色权限对比表 / render the role permission comparison table
        function renderRoleTable() {
            const wrap = document.getElementById('roleTable');
            if (!wrap) return;
            const icon = yes => yes
                ? '<svg class="ico perm-yes" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-check"/></svg>'
                : '<svg class="ico perm-no" viewBox="0 0 24 24" aria-hidden="true"><use href="/images/icons.svg#ico-minus"/></svg>';
            let html = '<table class="role-table"><thead><tr>' +
                ROLE_HEADERS.map(h => '<th>' + h + '</th>').join('') +
                '</tr></thead><tbody>';
            ROLE_PERMISSIONS.forEach(row => {
                html += '<tr><th>' + row.label + '</th>' +
                    row.perms.map(p => '<td>' + icon(p) + '</td>').join('') +
                    '</tr>';
            });
            html += '</tbody></table>';
            wrap.innerHTML = html;
        }

        // Load users
        async function loadUsers() {
            try {
                const response = await fetch('/api/admin/users');
                if (response.ok) {
                    const data = await response.json();
                    renderUserList(data);
                }
            } catch (error) {
                console.error('Failed to load users:', error);
            }
        }

        // Load storage spaces for checkboxes
        async function loadStorages() {
            try {
                const response = await fetch('/api/admin/storage');
                if (response.ok) {
                    availableStorages = await response.json();
                }
            } catch (error) {
                console.error('Failed to load storages:', error);
            }
        }

        function renderUserList(userList) {
            const container = document.getElementById('userList');
            if (userList.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无用户</div>';
                return;
            }

            container.innerHTML = userList.map(user => `
                <div class="table-row">
                    <div class="table-cells table-cells-4">
                        <div class="cell-strong">${user.username}</div>
                        <div>
                            <span class="badge badge-${user.role.toLowerCase()}">${getRoleName(user.role)}</span>
                        </div>
                        <div>${renderStorageChips(user.storageSpaces)}</div>
                        <div class="row-actions">
                            <button onclick="editUser('${user.username}')" class="btn btn-sm btn-secondary">编辑</button>
                            <button onclick="deleteUser('${user.username}')" class="btn btn-sm btn-danger">删除</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function getRoleName(role) {
            const names = { 'ADMIN': '超级管理员', 'MANAGER': '管理员', 'USER': '普通用户' };
            return names[role] || role;
        }

        // 存储空间渲染为胶囊 / render storage spaces as capsule chips
        function renderStorageChips(spaces) {
            if (!spaces || spaces.length === 0) {
                return '<span class="storage-chips-empty">-</span>';
            }
            return '<div class="storage-chips">' +
                spaces.map(s => `<span class="storage-chip">${s}</span>`).join('') +
                '</div>';
        }

        function openAddModal() {
            isEditing = false;
            document.getElementById('modalTitle').textContent = '新增用户';
            document.getElementById('userForm').reset();
            document.getElementById('editUsername').value = '';
            document.getElementById('passwordLabel').textContent = '密码';
            document.getElementById('password').placeholder = '请输入密码';
            document.getElementById('passwordField').style.display = 'block';
            document.getElementById('password').required = true;
            document.getElementById('confirmPassword').required = true;
            renderStorageCheckboxes([]);
            document.getElementById('userModal').classList.add('show');
        }

        function editUser(username) {
            isEditing = true;
            document.getElementById('modalTitle').textContent = '编辑用户';
            document.getElementById('editUsername').value = username;
            document.getElementById('username').value = username;
            document.getElementById('password').value = '';
            document.getElementById('confirmPassword').value = '';
            // 编辑时密码留空则不修改 / when editing, leave blank to keep current password
            document.getElementById('passwordLabel').textContent = '新密码（留空则不修改）';
            document.getElementById('password').placeholder = '输入新密码，留空则不修改';
            document.getElementById('password').required = false;
            document.getElementById('confirmPassword').required = false;
            document.getElementById('passwordField').style.display = 'block';

            // Load user details
            fetch(`/api/admin/users/${username}`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('role').value = data.role;
                    renderStorageCheckboxes(data.storageSpaces || []);
                });
            document.getElementById('userModal').classList.add('show');
        }

        function renderStorageCheckboxes(selectedStorages) {
            const container = document.getElementById('storageCheckboxes');
            if (availableStorages.length === 0) {
                container.innerHTML = '<p class="text-muted text-small">暂无可用存储空间</p>';
                return;
            }

            container.innerHTML = availableStorages.map(space => `
                <div class="checkbox-item">
                    <input type="checkbox" id="storage_${space.name}" value="${space.name}" ${selectedStorages.includes(space.name) ? 'checked' : ''}>
                    <label for="storage_${space.name}">${space.name}</label>
                </div>
            `).join('');
        }

        function closeModal() {
            document.getElementById('userModal').classList.remove('show');
        }

        async function saveUser(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = document.getElementById('role').value;

            // Get selected storage spaces
            const storageSpaces = [];
            availableStorages.forEach(space => {
                const checkbox = document.getElementById(`storage_${space.name}`);
                if (checkbox && checkbox.checked) {
                    storageSpaces.push(space.name);
                }
            });

            // Validate password:新增必填;编辑时若填写了新密码则需与确认一致 / new user requires password; on edit, only validate match when a new password is entered
            if (password && password !== confirmPassword) {
                Notify.warning('两次输入的密码不一致', { position: 'top-center' });
                return;
            }
            if (password && password.length < 6) {
                Notify.warning('密码至少 6 位', { position: 'top-center' });
                return;
            }

            const data = {
                username,
                role,
                storageSpaces
            };

            if (!isEditing || password) {
                data.password = password;
            }

            try {
                const url = isEditing ? `/api/admin/users/${document.getElementById('editUsername').value}` : '/api/admin/users';
                const method = isEditing ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                // 后端即使逻辑失败也返回 HTTP 200 + {success,error}，需按 success 判断
                // Backend returns HTTP 200 with {success,error} even on logical failure.
                const result = await response.json();
                if (result.success) {
                    closeModal();
                    loadUsers();
                } else {
                    Notify.error('保存失败：' + (result.error || '未知错误'), { position: 'top-center' });
                }
            } catch (error) {
                Notify.error('保存失败：' + error.message, { position: 'top-center' });
            }
        }

        async function deleteUser(username) {
            if (username === 'admin') {
                Notify.warning('不能删除默认管理员账号', { position: 'top-center' });
                return;
            }

            const ok = await Notify.confirm({
                title: '确认删除',
                content: `确定要删除用户 "${username}" 吗？`,
                okText: '确定删除',
                cancelText: '取消',
                okType: 'danger'
            });
            if (!ok) return;

            try {
                const response = await fetch(`/api/admin/users/${username}`, {
                    method: 'DELETE'
                });

                // 后端即使逻辑失败也返回 HTTP 200 + {success,error}，需按 success 判断
                // Backend returns HTTP 200 with {success,error} even on logical failure.
                const result = await response.json();
                if (result.success) {
                    loadUsers();
                    Notify.success('用户已删除');
                } else {
                    Notify.error('删除失败：' + (result.error || '未知错误'), { position: 'top-center' });
                }
            } catch (error) {
                Notify.error('删除失败：' + error.message, { position: 'top-center' });
            }
        }

        // Initialize
        renderRoleTable();
        loadUsers();
        loadStorages();
    </script>
    <script src="/js/theme.js"></script>
</body>
</html>
