# 发布流水线 / Release pipeline
# 推送 V* 形式的 tag(如 V2.1.0)时触发:校验版本、构建产物并按版本说明文件发布 GitHub Release。
# Triggered by a V* tag (e.g. V2.1.0): validates the version, builds artifacts, and publishes release notes from the repository.
name: Release

on:
  push:
    tags:
      - 'V*'

# 创建 Release / 上传资源需要写权限 / needs write access to create the release & upload assets
permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码 / Checkout
        uses: actions/checkout@v4

      - name: 安装 JDK 8 / Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: 校验版本与发布说明 / Validate version and release notes
        id: ver
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          TAG_VERSION="${GITHUB_REF_NAME#V}"
          NOTES_FILE=".github/release-notes/${GITHUB_REF_NAME}.md"

          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: pom.xml=$VERSION, tag=$GITHUB_REF_NAME"
            exit 1
          fi
          if [ ! -s "$NOTES_FILE" ]; then
            echo "Missing or empty release notes: $NOTES_FILE"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "display=v$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: 构建(含测试)/ Build with Maven
        run: mvn -B -V package

      - name: 暂存产物 / Stage artifacts
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          mkdir -p staging
          cp "target/file-box-${VERSION}.jar" staging/
          cp "target/file-box-${VERSION}-release.tar.gz" staging/
          echo "=== staged artifacts ==="
          ls -la staging/

      - name: 创建 Release 并上传产物 / Create release & upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: File Box ${{ steps.ver.outputs.display }}
          body_path: .github/release-notes/${{ github.ref_name }}.md
          files: |
            staging/file-box-*.jar
            staging/file-box-*-release.tar.gz
